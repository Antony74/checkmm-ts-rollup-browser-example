<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>checkmm-ts vanilla browser example</title>
        <link rel="stylesheet" href="gh-fork-ribbon.css" />
        <style>
            #editor {
                width: 640px;
                height: 480px;
            }
        </style>
    </head>
    <body>
        <a
            class="github-fork-ribbon right-top"
            href="https://github.com/Antony74/checkmm-ts-vanilla-browser-example"
            data-ribbon="Fork me on GitHub"
            title="Fork me on GitHub"
        >
            Fork me on GitHub
        </a>

        <h1>checkmm-ts vanilla browser example</h1>
        <div>
            <textarea
                id="editor"
                aria-label="MM Editor"
                spellcheck="false"
            ></textarea>
        </div>
        <div><button id="validate">Validate</button></div>
        <div id="output"></div>
        <script type="module" src="index.js"></script>
    </body>
</html>
